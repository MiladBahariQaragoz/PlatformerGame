<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer Game</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* the canvas is sized to fit the window; never scroll */
      background: #1a1a24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      background: #000;
      /* The game is drawn with smooth vector shapes (not pixel art), and the canvas is sized for
         the display's pixel density in JS - so let the browser render it smoothly. `pixelated`
         here is what made the deployed build look blocky on HiDPI screens. */
      image-rendering: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
